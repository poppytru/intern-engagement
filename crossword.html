<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTA Crossword — Q2 Challenge</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: var(--white); }

        .cw-page {
            max-width: 1060px;
            margin: 0 auto;
            padding: 24px 24px 60px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            font-size: 15px;
        }

        /* Active clue bar */
        .active-clue-bar {
            background: var(--off-white);
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 16px;
            margin-bottom: 20px;
            font-size: 16px;
            color: var(--squid-ink);
            min-height: 42px;
        }
        .active-clue-bar .clue-label {
            font-weight: 700;
            color: var(--smile-orange);
        }

        /* Layout: grid left, clues right */
        .cw-layout {
            display: flex;
            gap: 36px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* Grid */
        .cw-grid-wrap { flex-shrink: 0; }
        .cw-grid {
            display: inline-grid;
            gap: 0;
        }
        .cw-cell {
            width: 38px;
            height: 38px;
            border: 1px solid #bbb;
            position: relative;
            background: var(--white);
        }
        .cw-cell.black { background: var(--squid-ink); border-color: var(--squid-ink); }
        .cw-cell .num {
            position: absolute;
            top: 1px; left: 3px;
            font-size: 10px;
            color: #444;
            pointer-events: none;
            z-index: 1;
        }
        .cw-cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            text-transform: uppercase;
            background: transparent;
            outline: none;
            caret-color: var(--smile-orange);
        }
        .cw-cell input:focus { background: #BBDEFB; }
        .cw-cell.word-highlight input { background: #E3F2FD; }

        /* Clues panel */
        .cw-clues-panel {
            flex: 1;
            min-width: 300px;
            display: flex;
            gap: 32px;
        }
        .cw-clue-col { flex: 1; }
        .cw-clue-col h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #ddd;
            color: var(--squid-ink);
        }
        .cw-clue-col ul { list-style: none; padding: 0; }
        .cw-clue-col li {
            font-size: 14px;
            padding: 5px 6px;
            border-radius: 4px;
            cursor: pointer;
            line-height: 1.45;
            margin-bottom: 2px;
        }
        .cw-clue-col li:hover { background: #FFF3E0; }
        .cw-clue-col li.active-clue { background: #BBDEFB; }
        .cw-clue-col li .cn {
            font-weight: 700;
            margin-right: 6px;
            min-width: 20px;
            display: inline-block;
        }

        /* Submit area */
        .submit-area {
            text-align: center;
            margin-top: 36px;
        }
        .submit-area .challenge-btn { font-size: 18px; padding: 14px 48px; }

        .powered-by {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #999;
        }

        @media (max-width: 768px) {
            .cw-layout { flex-direction: column; }
            .cw-clues-panel { flex-direction: column; gap: 20px; }
            .cw-cell { width: 30px; height: 30px; }
            .cw-cell input { font-size: 13px; }
            .cw-cell .num { font-size: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <img src="header-banner.png" alt="Building the future starts with you — AUTA Intern Celebrations" class="header-banner">
    </header>

    <div class="cw-page">
        <a href="index.html" class="back-link">← Back to celebrations</a>

        <div class="active-clue-bar" id="activeClueBar">
            <span class="clue-label">1 ACROSS</span> &bull; "Success and Scale Bring Broad ____"
        </div>

        <div class="cw-layout">
            <div class="cw-grid-wrap" id="gridContainer"></div>
            <div class="cw-clues-panel">
                <div class="cw-clue-col">
                    <h3>ACROSS</h3>
                    <ul id="acrossClues"></ul>
                </div>
                <div class="cw-clue-col">
                    <h3>DOWN</h3>
                    <ul id="downClues"></ul>
                </div>
            </div>
        </div>

        <div class="submit-area">
            <a href="https://admin.pulse.amazon/staffApplication/MGT6YZLT" target="_blank" rel="noopener" class="challenge-btn active">Submit your answers</a>
        </div>
        <p class="powered-by">AUTA Crossword &bull; Powered by PuzzleMe&trade;</p>
    </div>

    <footer>
        <div class="container">
            <img src="amazon-smile.png" alt="Amazon Smile" class="footer-smile">
        </div>
    </footer>

    <script>
    // ===== Crossword Data =====
    // Grid: 18 rows x 13 cols. '.' = white, '#' = black
    const ROWS = 18, COLS = 13;
    const grid = [
        '.','.','.','#','#','#','#','#','#','#','#','#','#',
        '#','#','.','#','#','.','#','#','#','#','#','#','#',
        '#','#','.','#','.','.','.','.','#','#','#','#','#',
        '#','#','.','#','.','#','.','#','#','#','#','#','#',
        '.','.','.','.','.','.','.','.','.','.','#','#','#',
        '#','#','.','#','.','#','#','#','#','#','#','#','#',
        '#','#','.','#','.','#','#','#','.','#','.','.','#',
        '#','#','#','#','.','#','.','#','.','#','#','#','#',
        '#','#','#','.','.','.','.','.','.','.','.','#','#',
        '#','#','#','#','#','#','#','#','.','#','#','#','#',
        '#','.','#','#','#','#','#','#','.','#','#','#','#',
        '#','.','.','.','.','.','.','#','.','#','#','#','#',
        '#','#','#','#','#','#','#','#','.','#','#','#','#',
        '#','.','#','#','#','#','#','#','#','#','#','#','#',
        '.','.','.','.','.','.','.','#','#','#','#','#','#',
        '#','.','#','#','#','#','#','#','#','#','#','#','#',
        '#','.','.','.','.','.','.','.','.','#','#','#','#',
        '#','#','#','#','#','#','#','#','#','#','#','#','#',
    ];

    const cellNumbers = {
        0:1, 1:2, 2:3,
        5:5,
        16:6, 17:7, 18:8, 19:9,
        30:10,
        52:4,
        58:11, 60:12,
        70:14,
        81:13,
        88:15,
        92:16,
        105:17,
        114:18,
    };

    const clues = {
        across: [
            {num:1, text:'"Success and Scale Bring Broad ____"'},
            {num:4, text:'Intern ____ Partner. Main POC to facilitate week 1 onboarding plan for field interns'},
            {num:6, text:'"Are ____, A Lot"'},
            {num:7, text:'Challenge decisions and advocate clearly.'},
            {num:11, text:'Employee-Led Groups'},
            {num:15, text:'Original name of Amazon'},
            {num:16, text:"One of Amazon's Subsidiaries"},
            {num:17, text:'Discontinued 3D smartphone developed by Amazon'},
            {num:18, text:'AUTA Crossword — Powered by PuzzleMe™'},
        ],
        down: [
            {num:2, text:'"Insist of the Highest ____"'},
            {num:3, text:'Takes the lead, accepts responsibility, and makes decisions'},
            {num:5, text:"One of Amazon's AI Workspaces"},
            {num:8, text:'Voluntary overtime'},
            {num:9, text:'Amazon started out as an online ____'},
            {num:10, text:'"I\'ll ____ back once I know more"'},
            {num:12, text:'Page for all events'},
            {num:13, text:'Relocation Vendor'},
            {num:14, text:'Shared understanding'},
        ]
    };

    // ===== Render =====
    const inputs = [];

    function renderGrid() {
        const container = document.getElementById('gridContainer');
        const gridEl = document.createElement('div');
        gridEl.className = 'cw-grid';
        gridEl.style.gridTemplateColumns = `repeat(${COLS}, 38px)`;

        for (let i = 0; i < grid.length; i++) {
            const cell = document.createElement('div');
            cell.className = 'cw-cell';
            cell.dataset.idx = i;

            if (grid[i] === '#') {
                cell.classList.add('black');
            } else {
                if (cellNumbers[i] !== undefined) {
                    const numSpan = document.createElement('span');
                    numSpan.className = 'num';
                    numSpan.textContent = cellNumbers[i];
                    cell.appendChild(numSpan);
                }
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.setAttribute('aria-label', `Cell row ${Math.floor(i/COLS)+1} col ${(i%COLS)+1}`);
                input.dataset.idx = i;
                cell.appendChild(input);
                inputs.push(input);
            }
            gridEl.appendChild(cell);
        }
        container.appendChild(gridEl);

        // Navigation
        inputs.forEach((inp, idx) => {
            inp.addEventListener('input', () => {
                if (inp.value.length === 1 && idx < inputs.length - 1) inputs[idx + 1].focus();
            });
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && inp.value === '' && idx > 0) {
                    inputs[idx - 1].focus();
                }
            });
            inp.addEventListener('focus', () => {
                // Find which clue this cell belongs to and highlight it
                const cellIdx = parseInt(inp.dataset.idx);
                highlightClue(cellIdx);
            });
        });
    }

    function renderClues() {
        const acrossUl = document.getElementById('acrossClues');
        const downUl = document.getElementById('downClues');

        clues.across.forEach(c => {
            const li = document.createElement('li');
            li.dataset.num = c.num;
            li.dataset.dir = 'across';
            li.innerHTML = `<span class="cn">${c.num}</span>${c.text}`;
            acrossUl.appendChild(li);
        });

        clues.down.forEach(c => {
            const li = document.createElement('li');
            li.dataset.num = c.num;
            li.dataset.dir = 'down';
            li.innerHTML = `<span class="cn">${c.num}</span>${c.text}`;
            downUl.appendChild(li);
        });
    }

    function highlightClue(cellIdx) {
        // Clear previous highlights
        document.querySelectorAll('.cw-clue-col li.active-clue').forEach(el => el.classList.remove('active-clue'));

        // Find the clue number for this cell (simple: find nearest numbered cell to the left in same row, or above in same col)
        const row = Math.floor(cellIdx / COLS);
        const col = cellIdx % COLS;

        // Check across first
        let acrossNum = null;
        for (let c = col; c >= 0; c--) {
            const idx = row * COLS + c;
            if (grid[idx] === '#') break;
            if (cellNumbers[idx] !== undefined) {
                // Check if this number is an across clue
                if (clues.across.find(cl => cl.num === cellNumbers[idx])) {
                    acrossNum = cellNumbers[idx];
                    break;
                }
            }
        }

        if (acrossNum) {
            const li = document.querySelector(`.cw-clue-col li[data-num="${acrossNum}"][data-dir="across"]`);
            if (li) {
                li.classList.add('active-clue');
                const clue = clues.across.find(c => c.num === acrossNum);
                document.getElementById('activeClueBar').innerHTML =
                    `<span class="clue-label">${acrossNum} ACROSS</span> &bull; ${clue.text}`;
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
        renderClues();
        // Highlight first clue by default
        document.querySelector('.cw-clue-col li')?.classList.add('active-clue');
    });
    </script>
</body>
</html>
